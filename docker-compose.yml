version: '3.8'

services:
  backend:
    build: ./server
    container_name: tnp_backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env # Loads your Flask secrets and Mongo URI

  frontend:
    build: 
      context: ./client
      args:
        # We will replace this with your EC2 IP later
        - VITE_API_BASE_URL=http://${EC2_PUBLIC_IP}:5000/api
    container_name: tnp_frontend
    ports:
      - "80:80"
    depends_on:
      - backend